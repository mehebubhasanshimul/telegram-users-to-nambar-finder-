<!DOCTYPE html><html lang="bn"><head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SHADOW JOKER · মাল্টি এপিআই ফাইন্ডার</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, sans-serif;
            position: relative;
            background: url('https://media.giphy.com/media/zqZVwxcVDkwgR7QB4x/giphy.gif') no-repeat center center fixed;
            background-size: cover;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(3, 7, 18, 0.90);
            z-index: 1;
        }
        .main-container { position: relative; z-index: 10; }
        .glass-premium {
            background: rgba(13, 18, 33, 0.72);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
        }
        .joker-glow-text {
            background: linear-gradient(135deg, #ef4444, #a855f7, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .btn-premium {
            background: linear-gradient(135deg, #3b82f6, #4f46e5);
            transition: all 0.25s ease;
        }
        .btn-premium:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4);
        }
        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #ef4444;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="w-full max-w-md mx-auto p-4 main-container">
    <div class="text-center mb-6">
        <div class="inline-block relative mb-3">
            <img src="https://media.giphy.com/media/miPqFiFqjXiXm/giphy.gif" class="w-24 h-24 rounded-full border-2 border-purple-500/50 object-cover shadow-lg" alt="Joker Logo" />
            <span class="absolute bottom-0 right-1 bg-green-500 w-4 h-4 rounded-full border-2 border-slate-900 flex items-center justify-center text-[7px] text-white"><i class="fas fa-check"></i></span>
        </div>
        <h1 class="text-4xl font-extrabold tracking-wider joker-glow-text font-mono uppercase">SHADOW JOKER</h1>
        <p class="text-[11px] text-slate-400 tracking-widest mt-1 flex items-center justify-center gap-1.5 uppercase font-mono">
            <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span> MULTI-SOURCE INTEL FINDER
        </p>
    </div>

    <div class="glass-premium rounded-3xl p-5 mb-5">
        <div class="space-y-4">
            <div class="relative">
                <i class="fas fa-at absolute left-4 top-1/2 -translate-y-1/2 text-purple-400 text-sm"></i>
                <input id="usernameInput" type="text" placeholder="ইউজারনেম দিন (যেমন: @SHADOW_JOKER_CTH)" class="w-full bg-slate-950/50 border border-white/5 rounded-2xl pl-11 pr-4 py-4 text-white placeholder-slate-500 text-sm focus:outline-none focus:border-purple-500/30 transition-all font-mono" />
            </div>
            <button onclick="searchUser()" class="btn-premium w-full py-4 rounded-2xl text-white font-bold text-sm tracking-wide uppercase flex items-center justify-center gap-2">
                <i class="fas fa-network-wired animate-spin"></i> মাল্টি-সার্চ করুন · INTEL SEARCH
            </button>
        </div>
    </div>

    <div id="resultArea" class="hidden"></div>

    <div class="mt-6 text-center space-y-4">
        <a href="https://t.me/+inTW2I925HcyMjU1" target="_blank" class="glass-premium w-full max-w-xs mx-auto py-3 px-4 rounded-2xl text-xs text-slate-300 hover:text-white transition-all flex items-center justify-center gap-3 group">
            <i class="fas fa-users text-purple-400"></i>
            <span>আমাদের গ্রুপে জয়েন করুন</span>
            <i class="fas fa-arrow-right text-[10px] text-purple-400/50 group-hover:translate-x-1 transition"></i>
        </a>
        <div class="text-[10px] text-slate-500 font-mono tracking-wider uppercase pt-2">
            © reverse cyber team help 2026
        </div>
    </div>
</div>

<script>
async function searchUser() {
    const usernameInput = document.getElementById('usernameInput').value.trim();
    const resultArea = document.getElementById('resultArea');

    if(!usernameInput) {
        resultArea.classList.remove('hidden');
        resultArea.innerHTML = `<div class="glass-premium p-4 rounded-3xl text-center text-red-400 text-sm">দয়া করে একটি ইউজারনেম দিন!</div>`;
        return;
    }

    resultArea.classList.remove('hidden');
    resultArea.innerHTML = `<div class="glass-premium p-6 rounded-3xl flex flex-col items-center justify-center"><div class="loader w-8 h-8 rounded-full mb-3"></div><p class="text-xs text-slate-400 tracking-widest animate-pulse">মাল্টিপল এপিআই স্ক্যান করা হচ্ছে...</p></div>`;

    try {
        const response = await fetch(`/api/search?username=${encodeURIComponent(usernameInput)}`);
        const json = await response.json();

        if(json.success && json.data) {
            const resData = json.data;
            const finalPhoto = resData.photo ? resData.photo : `https://ui-avatars.com/api/?name=${encodeURIComponent(resData.name)}&background=111827&color=a855f7&size=120`;

            resultArea.innerHTML = `
                <div class="glass-premium p-6 rounded-[32px] space-y-6">
                    <div class="flex flex-col items-center">
                        <div class="relative">
                            <img src="${finalPhoto}" class="w-24 h-24 rounded-full border-2 border-purple-500/40 object-cover shadow-2xl" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(resData.name)}&background=111827&color=a855f7&size=120'"/>
                            <span class="absolute bottom-0 right-1 bg-green-500 w-5 h-5 rounded-full border-2 border-slate-900 flex items-center justify-center text-[8px] text-white"><i class="fas fa-check"></i></span>
                        </div>
                        <h2 class="text-xl font-bold mt-4 text-white tracking-wide font-mono uppercase text-center">${resData.name}</h2>
                        <a href="https://t.me/${resData.username}" target="_blank" class="text-blue-400 text-xs font-mono hover:underline mt-1.5 flex items-center gap-1">
                            <i class="fas fa-link text-[10px]"></i> https://t.me/${resData.username}
                        </a>
                    </div>

                    <div class="space-y-3">
                        <div class="flex items-center justify-between bg-slate-900/50 p-4 rounded-2xl border border-white/5 shadow-inner">
                            <span class="text-slate-400 text-xs flex items-center gap-2.5"><i class="fas fa-id-card text-purple-400 w-4 text-sm"></i> ID</span>
                            <span class="font-mono text-sm text-slate-300">${resData.id}</span>
                        </div>
                        <div class="flex items-center justify-between bg-slate-900/50 p-4 rounded-2xl border border-white/5 shadow-inner">
                            <span class="text-slate-400 text-xs flex items-center gap-2.5"><i class="fas fa-phone text-blue-400/80 w-4 text-sm"></i> নাম্বার</span>
                            <span class="font-mono text-sm text-slate-300">হাইড করা (🔒 Secured)</span>
                        </div>
                        <div class="flex items-center justify-between bg-slate-900/50 p-4 rounded-2xl border border-white/5 shadow-inner">
                            <span class="text-slate-400 text-xs flex items-center gap-2.5"><i class="fas fa-globe text-blue-400/80 w-4 text-sm"></i> দেশ</span>
                            <span class="font-sans text-sm text-slate-300">${resData.country}</span>
                        </div>
                        <div class="bg-slate-950/40 p-4 rounded-2xl border border-white/5 shadow-inner">
                            <span class="text-slate-400 text-xs flex items-center gap-2.5 mb-1.5"><i class="fas fa-quote-left text-blue-400/60 w-4 text-sm"></i> বায়ো</span>
                            <p class="text-xs text-slate-300 italic font-mono leading-relaxed px-1">${resData.bio}</p>
                        </div>
                    </div>

                    <div class="pt-2">
                        <a href="https://t.me/${resData.username}" target="_blank" class="btn-premium w-full py-4 rounded-2xl font-bold text-sm text-white flex items-center justify-center gap-2 uppercase shadow-lg">
                            <i class="fab fa-telegram-plane text-base"></i> টেলিগ্রামে দেখুন
                        </a>
                    </div>
                </div>`;
        } else {
            resultArea.innerHTML = `<div class="glass-premium p-5 rounded-3xl text-center text-amber-400 text-sm">${json.msg || 'ইউজার পাওয়া যায়নি।'}</div>`;
        }
    } catch (error) {
        resultArea.innerHTML = `<div class="glass-premium p-5 rounded-3xl text-center text-red-500 text-sm">সার্ভার ত্রুটি! আবার চেষ্টা করুন।</div>`;
    }
}
</script>
</body></html>
